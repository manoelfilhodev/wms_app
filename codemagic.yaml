workflows:
  flutter-android:
    name: Flutter Android Build
    max_build_duration: 60
    environment:
      flutter: "stable"   # usa versão estável já disponível na imagem para evitar downloads grandes
      xcode: latest
      java: "17"         # Android Gradle Plugin exige Java 17
    cache:
      cache_paths:
        - $FLUTTER_ROOT            # 👈 agora cacheia o SDK também
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze || true
      - name: Run tests
        script: flutter test --no-pub --coverage || true  # 👈 adiciona --no-pub e --coverage
      - name: Build APK (release)
        script: flutter build apk --release --no-shrink  # 👈 adiciona --no-shrink para builds mais rápidos
      - name: Build AppBundle (release)
        script: flutter build appbundle --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - coverage/lcov.info  # 👈 adiciona cobertura se existir
    publishing:
      email:
        recipients:
          - "manoel.filho.mf@icloud.com"
        notify:
          success: true
          failure: true
